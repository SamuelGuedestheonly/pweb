<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JM Viagens - Buscar Pacotes</title>
</head>
<body>

    <table border="0" width="900" align="center">
        
        <tr>
            <td>
                <img src="imagens/logo.png" alt="Logo" />
            </td>
            <td align="right">
                <a href="index.html">Home</a> | 
                <a href="quem-somos.html">Quem somos</a> | 
                <a href="destinos.html">Destinos</a> | 
                <a href="buscar-pacotes.html">Buscar Pacotes</a> | 
                <a href="contato.html">Contato</a>
            </td>
        </tr>

        <tr>
            <td colspan="2">
                <h2>Buscar Pacotes de Viagens</h2>
                <hr>
                
                <form action="#" method="POST">
                    <table border="0" cellpadding="5">
                        <tr>
                            <td>Origem:</td>
                            <td><input type="text" name="origem" required /></td>
                        </tr>
                        <tr>
                            <td>Destino:</td>
                            <td><input type="text" name="destino" required /></td>
                        </tr>
                        <tr>
                            <td>Data de Partida:</td>
                            <td><input type="date" name="data_partida" required /></td>
                        </tr>
                        <tr>
                            <td>Data de Retorno:</td>
                            <td><input type="date" name="data_retorno" required /></td>
                        </tr>
                        <tr>
                            <td>Quantidade de Quartos:</td>
                            <td><input type="number" name="quartos" min="1" value="1" /></td>
                        </tr>
                        <tr>
                            <td>Quantidade de Adultos:</td>
                            <td><input type="number" name="qtd_adultos" min="1" value="1" /></td>
                        </tr>
                        <tr>
                            <td>Quantidade de Crianças:</td>
                            <td><input type="number" name="qtd_criancas" min="0" value="0" /></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td><input type="submit" value="Pesquisar Pacotes" /></td>
                        </tr>
                    </table>
                </form>
                
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <h4>Todos os direitos reservados</h4>
            </td>
        </tr>

    </table>

</body>
</html>
