<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
</head>
<body>
    <h1>Cadastro</h1>

    <form action="https://qtqdkj.hospedagemelastica.com.br/pweb/salvar.jsp" method="POST">
        
        <label for="login">Login:</label><br>
        <input type="text" id="login" name="login" required><br><br>

        <label for="senha">Senha:</label><br>
        <input type="password" id="senha" name="senha" required><br><br>

        <label for="confirmarsenha">Confirmar senha:</label><br>
        <input type="password" id="confirmarsenha" name="confirmarsenha" required><br><br>

        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome"><br><br>

        <label>Sexo:</label><br>
        <input type="radio" id="masc" value="Masculino" name="sexo"> <label for="masc">Masculino</label><br>
        <input type="radio" id="fem" value="Feminino" name="sexo"> <label for="fem">Feminino</label><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label>Interesses:</label><br>
        <input type="checkbox" value="Futebol" name="interesses"> Futebol<br>
        <input type="checkbox" value="Politica" name="interesses"> Política<br> 
        <input type="checkbox" value="Economia" name="interesses"> Economia<br>
        <input type="checkbox" value="Carros" name="interesses"> Carros<br>
        <input type="checkbox" value="Celebridades" name="interesses"> Celebridades<br><br>

        <label for="ESTADO">UF:</label>
        <select name="ESTADO" id="ESTADO">
            <option value="piaui">Piauí</option>
            <option value="maranhao">Maranhão</option>
            <option value="ceara">Ceará</option>
            <option value="pernambuco">Pernambuco</option>
        </select><br><br>

        <label for="observacoes">Observações:</label><br>
        <textarea id="observacoes" name="observacoes" rows="4" cols="50">Adicione as informações aqui...</textarea>
        <br><br>

        <input type="submit" value="Enviar">
    </form>

</body>
</html>
