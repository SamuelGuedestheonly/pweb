<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Desafio - Tag Div e Span</title>
    <style>
        .header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
        }

        .main-content {
            float: left;
            width: 72%;
            background-color: #f5f5f5;
        }

        .sidebar {
            float: left;
            width: 20%;
            background-color: #e0e0e0;
        }

        .footer {
            background-color: rgb(206, 141, 123);
            width: 100%;
            height: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    
    <div class="header">
        <h1>Minha Página Web</h1>
    </div>

    <div class="sidebar">
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>
    </div>

    <div class="main-content">
        <p>Este é o conteúdo principal da página.</p>
        <p>Adicione mais parágrafos ou elementos conforme necessário.</p>
    </div>

    <div class="footer">
        <p>Rodapé da Página</p>
    </div>

</body>
</html>
