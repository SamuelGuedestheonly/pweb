<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Minha Página Web</title>
    <style>
        .header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 20px;
            margin-bottom: 10px;
        }

        .sidebar {
            float: left;
            width: 25%;
            background-color: #e0e0e0;
            height: 300px;
            margin-bottom: 10px;
        }

        .main-content {
            float: left;
            width: 73%;
            background-color: #f5f5f5;
            height: 300px;
            margin-left: 2%;
            margin-bottom: 10px;
        }

        .footer {
            clear: both;
            background-color: #333333;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Minha Página Web</h1>
    </div>

    <div class="sidebar">
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>
    </div>

    <div class="main-content">
        <p>Este é o conteúdo principal da página.</p>
        <p>Adicione mais parágrafos ou elementos conforme necessário.</p>
    </div>

    <div class="footer">
        <p>Rodapé da Página</p>
    </div>

</body>
</html>
