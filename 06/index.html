<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Minha Página Web</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .sidebar {
            float: left;
            width: 25%;
            background-color: #e0e0e0;
            padding: 15px;
            box-sizing: border-box;
        }

        .main-content {
            float: left;
            width: 75%;
            background-color: #f5f5f5;
            padding: 15px;
            box-sizing: border-box;
        }

        .footer {
            clear: both;
            background-color: #333333;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Minha Página Web</h1>
    </div>

    <div class="sidebar">
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>
    </div>

    <div class="main-content">
        <p>Este é o conteúdo principal da página.</p>
        <p>Adicione mais parágrafos ou elementos conforme necessário.</p>
    </div>

    <div class="footer">
        <p>Rodapé da Página</p>
    </div>

</body>
</html>
