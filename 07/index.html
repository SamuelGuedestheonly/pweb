<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <title>Fontes e Cores</title>
    <style type="text/css">
        .conteudo {
            font-size: 30px; 
        }

        .fonteSerif {
            font-family: "Times New Roman", Times, serif;
            font-size: 5em;
            font-style: italic;
        }

        .fonteSans-Serif {
            font-family: Verdana, Arial, Helvetica, sans-serif;
            font-size: 2.5em;
            font-style: normal;
        }

        .fonteMonospace {
            font-family: "Courier New", Courier, monospace;
            font-size: 1.25em;
            font-style: oblique;
        }
    </style>
</head>
<body>

    <div class="conteudo">
        <p class="fonteSerif">Programação Web</p>
        <p class="fonteSans-Serif">Programação Web</p>
        <p class="fonteMonospace">Programação Web</p>
    </div>

</body>
</html>
